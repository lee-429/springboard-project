<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>
</head>
<body>

<h2>게시글 수정</h2>

<form th:action="@{/board/update/{id}(id=${board.id})}" method="post" enctype="multipart/form-data">

  <table>
    <tr>
      <th>제목</th>
      <td>
        <input type="text" name="title" th:value="${board.title}" />
      </td>
    </tr>

    <tr>
      <th>작성자</th>
      <td>
        <input type="text" name="writer" th:value="${board.writer}" />
      </td>
    </tr>

    <tr>
      <th>내용</th>
      <td>
        <textarea name="content" rows="5" cols="30"
                  th:text="${board.content}"></textarea>
      </td>
    </tr>

    <tr>
      <th>첨부파일</th>
      <td>
        <div th:if="${board.originalFileName != null}">
          현재 파일 :
          <span th:text="${board.originalFileName}"></span>

          <br>

          파일 변경 :
          <input type="file" name="file">


          <input type="checkbox" name="deleteFile">
          파일 삭제
        </div>

        <div th:if="${board.originalFileName == null}">
          첨부된 파일 없음

          <br>

          <input type="file" name="file">
        </div>
      </td>
    </tr>
  </table>

  <button type="submit">수정 완료</button>

</form>

<br>

<a href="/board">목록으로</a>

</body>
</html>
