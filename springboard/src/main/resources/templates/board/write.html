<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .form-box {
      width: 400px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 15px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #333;
    }
  </style>

</head>

<body>

<h1>게시글 작성</h1>

<div class="form-box">

  <!-- 파일 업로드를 위해 multipart/form-data 형식으로 전송 -->
  <form action="/board" enctype="multipart/form-data" method="post">

    <input type="text" name="title" placeholder="제목">

    <textarea name="content" rows="5" placeholder="내용"></textarea>

    <input type="file" name="file">

    <button type="submit">등록</button>

  </form>

  <a href="/board">목록으로</a>

</div>

</body>
</html>
