<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    .box {
      width: 500px;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 6px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .row {
      margin-bottom: 10px;
    }

    .label {
      font-weight: bold;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      text-decoration: none;
      color: #333;
    }

    .btn {
      padding: 6px 10px;
      background: #333;
      color: white;
      border-radius: 4px;
      text-decoration: none;
    }

    .btn:hover {
      background: #555;
    }
  </style>

</head>

<body>

<div class="box">

  <h2>게시글 상세</h2>

  <div class="row">
    <span class="label">번호:</span>
    <span th:text="${board.id}"></span>
  </div>

  <div class="row">
    <span class="label">제목:</span>
    <span th:text="${board.title}"></span>
  </div>

  <div class="row">
    <span class="label">내용:</span>
    <div th:text="${board.content}"></div>
  </div>

  <div class="row">
    <span class="label">작성자:</span>
    <span th:text="${board.writer}"></span>
  </div>

  <div class="row">
    <span class="label">첨부파일:</span>

    <span th:if="${board.originalFileName == null}">
      없음
    </span>

    <a th:if="${board.originalFileName != null}"
       th:href="@{/uploads/{fileName}(fileName=${board.storedFileName})}"
       th:text="${board.originalFileName}">
    </a>
  </div>

  <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn">수정</a>
  <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post">
    <button type="submit" class="btn">삭제</button>
  </form>
  <a href="/board" class="btn">목록으로</a>

</div>

<!-- 댓글 영역 추가 -->

<div class="box" style="margin-top: 30px;">

  <h2>댓글</h2>

  <!-- 댓글 작성 -->
  <form th:action="@{/board/{boardId}/comments(boardId=${board.id})}" method="post">

    <div class="row">
      <textarea name="content"
                placeholder="댓글을 입력해주세요."
                style="width: 100%; height: 80px;"></textarea>
    </div>

    <button type="submit" class="btn">댓글 작성</button>

  </form>


  <hr>


  <!-- 댓글 목록 -->
  <div th:each="comment : ${comments}">

    <div class="row">
      <span class="label">작성자:</span>
      <span th:text="${comment.writer}"></span>
    </div>

    <div class="row">
      <span class="label">내용:</span>
      <span th:text="${comment.content}"></span>
    </div>

    <div class="row">
      작성일:
      <span th:text="${#temporals.format(comment.updatedAt != null ? comment.updatedAt : comment.createdAt, 'yyyy-MM-dd (HH:mm:ss)')}"></span>
    </div>

    <!-- 댓글 수정 -->
    <form th:action="@{/comments/{commentId}/edit(commentId=${comment.id})}"
          method="post">

      <input type="hidden"
             name="boardId"
             th:value="${board.id}">

      <input type="text"
             name="content"
             th:value="${comment.content}">

      <button type="submit" class="btn">
        수정
      </button>

    </form>


    <!-- 댓글 삭제 -->
    <form th:action="@{/comments/{commentId}/delete(commentId=${comment.id})}"
          method="post">

      <button type="submit" class="btn">
        삭제
      </button>

    </form>


    <hr>

  </div>

</div>

</body>
</html>
