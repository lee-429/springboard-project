spring.application.name=springboard

# MySQL 데이터베이스 연결 정보
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Entity를 기준으로 테이블 자동 생성/수정
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL 출력
spring.jpa.show-sql=true

# SQL 보기 좋게 출력
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Key
jwt.secret=${JWT_SECRET}

# Access Token 유효시간 (15분)
jwt.access-expiration=900000

# Refresh Token 유효시간 (7일)
jwt.refresh-expiration=604800000